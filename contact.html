<!doctype html>
<html>
  <head>
    <title>Contact - MotoMart</title>
  </head>

  <body>
    <h1 align="center">Contact MotoMart</h1>

    <hr />

    <a href="index.html">🏠 Home</a> | <a href="cars.html">🚗 Cars</a> |
    <a href="brands.html">🏷️ Brands</a> |
    <a href="services.html">🛠️ Services</a>

    <hr />

    <h2>Send Us a Message</h2>

    <form>
      <fieldset>
        <legend><b>Customer Information</b></legend>

        <label for="name">Full Name:</label><br />
        <input
          type="text"
          id="name"
          placeholder="Enter your full name"
          required
        />

        <br /><br />

        <label for="email">Email:</label><br />
        <input
          type="email"
          id="email"
          placeholder="example@email.com"
          required
        />

        <br /><br />

        <label for="phone">Phone Number:</label><br />
        <input type="tel" id="phone" placeholder="+8801XXXXXXXXX" required />

        <br /><br />

        <label>Gender:</label><br />

        <input type="radio" name="gender" /> Male
        <input type="radio" name="gender" /> Female

        <br /><br />

        <label>Select Your Favorite Brand:</label><br />

        <select>
          <option>Toyota</option>
          <option>Honda</option>
          <option>BMW</option>
        </select>

        <br /><br />

        <label>Services Needed:</label><br />

        <input type="checkbox" /> Buy Car <br />
        <input type="checkbox" /> Sell Car <br />
        <input type="checkbox" /> Test Drive <br />
        <input type="checkbox" /> Financing <br />

        <br />

        <label>Your Message:</label><br />

        <textarea
          rows="6"
          cols="50"
          placeholder="Write your message here..."
        ></textarea>

        <br /><br />

        <input type="submit" value="Send Message" />

        <input type="reset" value="Clear Form" />
      </fieldset>
    </form>

  </body>
